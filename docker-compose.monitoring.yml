# ─────────────────────────────────────────────
# Logging & Monitoring Stack
# This is a separate compose file — run alongside main compose
# Command: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up
#
# Stack:
#   - Loki: Log aggregation (collects logs from all containers)
#   - Promtail: Log shipper (reads Docker logs, sends to Loki)
#   - Grafana: Dashboard UI (visualizes logs from Loki)
# ─────────────────────────────────────────────

services:

  # ── Loki: Log Storage ──────────────────────
  # Loki stores logs like a database
  # Think of it as "Elasticsearch but just for logs"
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Promtail: Log Shipper ──────────────────
  # Promtail reads Docker container logs and ships them to Loki
  # It works like a log collector agent
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      # Read Docker logs from host
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring_network

  # ── Grafana: Dashboard UI ──────────────────
  # Web UI to visualize and query logs
  # Access at: http://localhost:3000
  # Default login: admin / admin
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - loki
    networks:
      - monitoring_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3


networks:
  monitoring_network:
    driver: bridge
    name: edutrack_monitoring


volumes:
  loki_data:
    driver: local
  grafana_data:
    driver: local