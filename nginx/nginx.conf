# ─────────────────────────────────────────────
# Nginx Reverse Proxy Configuration
# Role: Sits in front of Flask, handles all incoming traffic
# Benefits:
#   - Flask never exposed directly to internet
#   - Nginx handles static files faster than Flask
#   - Can add SSL/HTTPS here later
# ─────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # ── Upstream ──
    # "web" is the Docker service name — Docker DNS resolves it
    upstream flask_app {
        server web:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Proxy all requests to Flask ──
        location / {
            proxy_pass http://flask_app;

            # Pass real client info to Flask
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }

        # ── Health check endpoint ──
        location /health {
            proxy_pass http://flask_app/health;
        }

        # ── Hide Nginx version (security) ──
        server_tokens off;
    }
}