name: EduTrack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: premmaradiya/studentmanagement-web
  DOCKER_IMAGE_SHA: premmaradiya/studentmanagement-web:${{ github.sha }}
  DOCKER_IMAGE_LATEST: premmaradiya/studentmanagement-web:latest
  DOCKER_IMAGE_V2: premmaradiya/studentmanagement-web:v2.0

jobs:

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-size: ${{ steps.image-info.outputs.size }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_IMAGE_LATEST }} \
            --tag ${{ env.DOCKER_IMAGE_SHA }} \
            --tag ${{ env.DOCKER_IMAGE_V2 }} \
            .

      - name: Get image size
        id: image-info
        run: |
          SIZE=$(docker image inspect ${{ env.DOCKER_IMAGE_LATEST }} \
            --format='{{.Size}}' | awk '{printf "%.1f MB", $1/1024/1024}')
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Image size: $SIZE"

      - name: Save Docker image as artifact
        run: docker save ${{ env.DOCKER_IMAGE_LATEST }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1


  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_LATEST }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.DOCKER_IMAGE_LATEST }}
          format: sarif
          output: trivy-report.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.sarif


  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_LATEST }}
            ${{ env.DOCKER_IMAGE_SHA }}
            ${{ env.DOCKER_IMAGE_V2 }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Save image digest
        run: echo "${{ steps.build-push.outputs.digest }}" > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: digest.txt


  cosign:
    name: Sign and Verify Image
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download image digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Sign image with Cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE_DIGEST=$(cat digest.txt)
          cosign sign --yes \
            ${{ env.DOCKER_IMAGE }}@${IMAGE_DIGEST}
          echo "Image signed: ${{ env.DOCKER_IMAGE }}@${IMAGE_DIGEST}"

      - name: Verify image signature
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE_DIGEST=$(cat digest.txt)
          cosign verify \
            --certificate-identity-regexp="https://github.com/prem-maradiya/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.DOCKER_IMAGE }}@${IMAGE_DIGEST} | jq .

      - name: Pipeline summary
        run: |
          IMAGE_DIGEST=$(cat digest.txt)
          echo "## EduTrack CI/CD Pipeline - Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Success | Multi-stage Dockerfile |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scan | Passed | Security report saved as artifact |" >> $GITHUB_STEP_SUMMARY
          echo "| Push | Success | 3 tags pushed to Docker Hub |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign Sign | Signed | Keyless OIDC signing via GitHub |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign Verify | Verified | Signature confirmed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | \`${{ env.DOCKER_IMAGE_LATEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ env.DOCKER_IMAGE_V2 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ env.DOCKER_IMAGE_SHA }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${IMAGE_DIGEST}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify this image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='https://github.com/prem-maradiya/.*' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.DOCKER_IMAGE }}@${IMAGE_DIGEST}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY