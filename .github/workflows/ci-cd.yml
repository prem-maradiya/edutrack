# ─────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
# Project: EduTrack Student Management System
# GitHub:  ROMAN111954
# Docker:  premmaradiya
#
# Pipeline Flow:
#   git push → Build → Trivy Scan → Push to DockerHub → Sign → Verify
# ─────────────────────────────────────────────

name: EduTrack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: premmaradiya/studentmanagement-web
  DOCKER_IMAGE_TAG: premmaradiya/studentmanagement-web:${{ github.sha }}
  DOCKER_IMAGE_LATEST: premmaradiya/studentmanagement-web:latest

jobs:

  # ──────────────────────────────────────────
  # JOB 1: BUILD
  # ──────────────────────────────────────────
  build:
    name: 🔨 Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image — no cache, no push, just load locally
      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_LATEST }} -t ${{ env.DOCKER_IMAGE_TAG }} .

      # Save image as artifact for next job
      - name: Save Docker image as artifact
        run: docker save ${{ env.DOCKER_IMAGE_LATEST }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1


  # ──────────────────────────────────────────
  # JOB 2: TRIVY SECURITY SCAN
  # ──────────────────────────────────────────
  trivy-scan:
    name: 🔍 Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      # Scan for vulnerabilities — fails if CRITICAL found
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_LATEST }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Save report as artifact even if scan fails
      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.DOCKER_IMAGE_LATEST }}
          format: sarif
          output: trivy-report.sarif

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.sarif


  # ──────────────────────────────────────────
  # JOB 3: PUSH TO DOCKER HUB
  # Only runs on push to main, not PRs
  # ──────────────────────────────────────────
  push:
    name: 📦 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push — login happens before this
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE_LATEST }}

      - name: Save image digest
        run: echo "${{ steps.build-push.outputs.digest }}" > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: digest.txt


  # ──────────────────────────────────────────
  # JOB 4: COSIGN — SIGN & VERIFY
  # ──────────────────────────────────────────
  cosign:
    name: 🔐 Sign & Verify Image (Cosign)
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download image digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE_DIGEST=$(cat digest.txt)
          cosign sign --yes ${{ env.DOCKER_IMAGE }}@${IMAGE_DIGEST}

      - name: Verify image signature
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE_DIGEST=$(cat digest.txt)
          cosign verify \
            --certificate-identity-regexp="https://github.com/ROMAN111954/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.DOCKER_IMAGE }}@${IMAGE_DIGEST} | jq .

      - name: Pipeline summary
        run: |
          echo "## ✅ EduTrack CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Trivy Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Push to DockerHub | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Cosign Sign | ✅ Signed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Cosign Verify | ✅ Verified |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY