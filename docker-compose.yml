services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped

    secrets:
      - db_root_password
      - db_password

    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: student_db
      MYSQL_USER: edutrack_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - backend_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_app
    restart: unless-stopped

    secrets:
      - db_password

    environment:
      DB_HOST: db
      DB_USER: edutrack_user
      DB_NAME: student_db
      FLASK_ENV: production

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - backend_network
      - frontend_network

    expose:
      - "5000"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      web:
        condition: service_healthy

    networks:
      - frontend_network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"


networks:
  frontend_network:
    driver: bridge
    name: edutrack_frontend
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend_network:
    driver: bridge
    name: edutrack_backend
    ipam:
      config:
        - subnet: 172.21.0.0/24


volumes:
  mysql_data:
    driver: local
    name: edutrack_mysql_data


secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt
