# Promtail Configuration
# Promtail scrapes Docker container logs and sends to Loki
# It automatically labels logs with container name, image etc.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# Where to send logs
clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ──
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only collect logs from our app containers
          - name: name
            values:
              - flask_app
              - mysql_db
              - nginx_proxy

    relabel_configs:
      # Use container name as the stream label
      - source_labels: [__meta_docker_container_name]
        target_label: container
      # Add image name as label
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # Add log stream (stdout/stderr) as label
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream